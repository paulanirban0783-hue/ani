<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Proposal 😄</title>

	<style>
		body{
			margin:0;
			height:100vh;
			display:flex;
			justify-content:center;
			align-items:center;
			background: linear-gradient(135deg, #ff9a9e, #fad0c4);
			font-family: Arial, sans-serif;
			text-align:center;
		}

		.container{
			background:white;
			padding:40px;
			border-radius:20px;
			box-shadow:0 10px 30px rgba(0,0,0,0.2);
		}

		h1{
			margin-bottom:30px;
		}

		button{
			padding:10px 20px;
			margin:10px;
			border:none;
			border-radius:10px;
			font-size:16px;
			cursor:pointer;
			transition:0.3s;
		}

		#yes{
			background:#4CAF50;
			color:white;
		}

		#no{
			background:#f44336;
			color:white;
			position:absolute;
		}
	</style>
</head>

<body>

<div class="container">
	<h1>Do you want to marry me? 💍</h1>

	<button id="yes" onclick="yesClick()">Yes ❤️</button>
	<button id="no" onmouseover="runAway()">No 😢</button>
</div>

<script>
	let noBtn = document.getElementById("no");

	function yesClick(){
		document.body.innerHTML = "<h1>Yay! ❤️ You made me happy 😍</h1>";
	}

	function runAway(){
		let maxX = window.innerWidth - noBtn.offsetWidth;
		let maxY = window.innerHeight - noBtn.offsetHeight;

		let x = Math.random() * maxX;
		let y = Math.random() * maxY;

		noBtn.style.left = x + "px";
		noBtn.style.top = y + "px";
	}
</script>

</body>
</html>
